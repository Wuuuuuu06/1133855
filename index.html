        .carousel-track { display: flex; width: 300%; transition: transform 0.5s ease; }
        .slide { flex: 0 0 33.333%; width: 100%; height: 460px; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: contain; background: #000; }
        .overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); color: white; padding: 40px 30px 25px; }

        .arrow {

            background: rgba(0,0,0,0.65); color: white; border: none;
            width: 52px; height: 52px; font-size: 28px; cursor: pointer;
            border-radius: 50%; z-index: 10;
        }
        .arrow:hover { background: rgba(0,0,0,0.9); }
        .arrow-left { left: 15px; }
        .arrow-right { right: 15px; }

        .dots {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);

        }
        .dot { width: 12px; height: 12px; background: rgba(255,255,255,0.7); border-radius: 50%; cursor: pointer; }
        .dot.active { background: #fff; transform: scale(1.4); }

        }
    </style>
